# Glossary — recurring Risale-i Nur terms in plain English (our own wording).
# Definitions are companion aids, not translations of the text.
# `appearsIn` lists Flash numbers where the term is especially relevant.

- id: ihlas
  term: ihlâs
  arabic: إخلاص
  definitionEn: >-
    Sincerity: doing an act purely for God's pleasure, free of any wish for
    show, praise, status or worldly gain. The central theme of the 20th and
    21st Flashes.
  relatedTerms: [riya, hubb-u-cah, enaniyet]
  appearsIn: [10, 20, 21, 22]

- id: riya
  term: riyâ
  arabic: رياء
  definitionEn: >-
    Showing off in worship or good works — performing them to be seen and
    praised by people rather than for God. Nursî treats the love of fame
    behind it as a hidden form of associating partners with God.
  relatedTerms: [ihlas, hubb-u-cah]
  appearsIn: [21]

- id: uhuvvet
  term: uhuvvet
  arabic: أخوّة
  definitionEn: >-
    Brotherhood: the bond of faith that unites those who serve it, requiring
    that one set aside rivalry and envy and support one's companions.
  relatedTerms: [tefani, sahs-i-manevi]
  appearsIn: [4, 21]

- id: tefani
  term: tefânî
  arabic: تفانٍ
  definitionEn: >-
    Self-effacement among brothers: so dissolving one's ego in the
    fellowship that one takes grateful pride in a companion's merits and
    virtues as if they were one's own.
  relatedTerms: [uhuvvet, enaniyet, sahs-i-manevi]
  appearsIn: [21]

- id: sahs-i-manevi
  term: şahs-ı mânevî
  arabic: شخص معنوي
  definitionEn: >-
    The "collective personality" — the single moral/spiritual body formed
    when individuals unite in sincere common purpose, stronger and more
    enduring than any one person.
  relatedTerms: [uhuvvet, istirak-i-amal]
  appearsIn: [4, 21]

- id: istirak-i-amal
  term: iştirâk-i a'mâl
  arabic: اشتراك الأعمال
  definitionEn: >-
    Sharing in one another's deeds: through sincere unity, the reward of the
    group's collective worship is reflected, by God's grace, in each
    member's account — illustrated by the lamp and the needle analogies.
  relatedTerms: [sahs-i-manevi, uhuvvet, ihlas]
  appearsIn: [21]

- id: hubb-u-cah
  term: hubb-u câh
  arabic: حبّ الجاه
  definitionEn: >-
    Love of status and fame — the craving for position and renown that Nursî
    identifies as a chief enemy of sincerity and a root of showing off.
  relatedTerms: [riya, ihlas, enaniyet]
  appearsIn: [21]

- id: tul-i-emel
  term: tûl-i emel
  arabic: طول الأمل
  definitionEn: >-
    "Long-stretched hope": living as though one will not die soon, an
    attachment to the world that dulls sincerity and the readiness for the
    hereafter.
  relatedTerms: [rabita-i-mevt]
  appearsIn: [21]

- id: enaniyet
  term: enâniyet
  arabic: أنانية
  definitionEn: >-
    The ego or "I-ness": the self's tendency to claim ownership, importance
    and independence, which obstructs sincerity and the recognition of God.
  relatedTerms: [nefis, tefani, ihlas]
  appearsIn: [17, 21, 22, 30]

- id: rabita-i-mevt
  term: râbıta-i mevt
  arabic: رابطة الموت
  definitionEn: >-
    The contemplation of death: keeping one's mortality consciously in view
    as a means of protecting sincerity and loosening attachment to the world.
  relatedTerms: [tul-i-emel]
  appearsIn: [21, 26]

- id: nefis
  term: nefis
  arabic: نفس
  definitionEn: >-
    The lower self or soul that inclines toward ego, appetite and heedlessness;
    its purification (tazkiya) is a recurring concern.
  relatedTerms: [enaniyet, ihlas]
  appearsIn: [1, 21]

- id: iman
  term: îmân
  arabic: إيمان
  definitionEn: >-
    Belief or faith — affirmation of God, His messengers and the hereafter;
    strengthening and saving belief is the overarching aim of the Risale-i Nur.
  relatedTerms: [tevhid, marifetullah]
  appearsIn: [1, 17, 23, 30]

- id: tevhid
  term: tevhîd
  arabic: توحيد
  definitionEn: >-
    Divine oneness: affirming that God is one and that all things point to a
    single Creator — the truth defended against naturalism in the 23rd Flash.
  relatedTerms: [iman, marifetullah, divine-names]
  appearsIn: [1, 3, 6, 9, 23, 30]

- id: marifetullah
  term: mârifetullah
  arabic: معرفة الله
  definitionEn: >-
    Knowledge of God: coming to know the Creator through reflection on His
    works and names, the fruit toward which much of the work is directed.
  relatedTerms: [tefekkur, tevhid, divine-names]
  appearsIn: [3, 9, 17, 23, 29, 30]

- id: tefekkur
  term: tefekkür
  arabic: تفكّر
  definitionEn: >-
    Reflective thought: contemplating the signs in the universe to arrive at
    knowledge of God — described by Nursî as the way of the Risale-i Nur.
  relatedTerms: [marifetullah]
  appearsIn: [29]

- id: divine-names
  term: esmâ-i hüsnâ
  arabic: الأسماء الحسنى
  definitionEn: >-
    The "most beautiful names" of God. Their manifestations in creation —
    especially those bearing the Greatest Name — are a major theme of the
    30th Flash.
  relatedTerms: [marifetullah, tevhid]
  appearsIn: [3, 12, 14, 30]

- id: sunnet
  term: sünnet
  arabic: سنّة
  definitionEn: >-
    The Sunna: the practice and example of the Prophet Muhammad (peace be
    upon him), following which is presented as a path of guidance and light.
  relatedTerms: [bidat]
  appearsIn: [4, 5, 11, 14]

- id: bidat
  term: bid'at
  arabic: بدعة
  definitionEn: >-
    Innovation: introducing into religion practices with no basis in its
    sources — contrasted with the Sunna in the 11th Flash.
  relatedTerms: [sunnet]
  appearsIn: [11]

- id: iktisat
  term: iktisâd
  arabic: اقتصاد
  definitionEn: >-
    Frugality and economy: moderate, grateful use of provision as a form of
    worship, against waste and extravagance — the theme of the 19th Flash.
  relatedTerms: [sukur]
  appearsIn: [19]

- id: sukur
  term: şükür
  arabic: شكر
  definitionEn: >-
    Gratitude: recognising every blessing as a gift and responding with
    thankfulness, treated as a fundamental duty of the servant.
  relatedTerms: [iktisat, sabir, riza]
  appearsIn: [2, 19]

- id: sefkat
  term: şefkat
  arabic: شفقة
  definitionEn: >-
    Compassion and tender mercy — a quality Nursî foregrounds as a swift,
    pure path to God, and a lens for consoling the sick and the elderly.
  relatedTerms: []
  appearsIn: [10, 25, 26]

- id: besmele
  term: besmele
  arabic: بسملة
  definitionEn: >-
    The phrase "In the name of God, the Most Merciful, the Most
    Compassionate" — its mysteries are expounded in the Second Station of the
    14th Flash.
  relatedTerms: [divine-names]
  appearsIn: [14]

- id: sabir
  term: sabır
  arabic: صبر
  definitionEn: >-
    Patience — steadfast endurance under hardship. In the Second Flash Nursî
    treats it as a God-given strength rationed for the present: enough for any
    single day's trial, but wasted when spent grieving the past or dreading the
    future.
  relatedTerms: [sukur, riza, tevekkul]
  appearsIn: [2]

- id: tevekkul
  term: tevekkül
  arabic: توكّل
  definitionEn: >-
    Reliance on God — entrusting the outcome to Him after doing one's own part.
    In the Second Flash it is the inner posture that, paired with contentment,
    keeps a hardship from taking root: meet misfortune trusting its Sender and
    it loosens its grip.
  relatedTerms: [riza, sabir, kader]
  appearsIn: [1, 2, 4, 5, 6, 12, 22]

- id: riza
  term: rızâ
  arabic: رضا
  definitionEn: >-
    Contentment with God's decree — accepting what He sends without resentment
    or protest. The Second Flash sets it against the anxious complaint that, it
    argues, drives an ailment from the body into the heart.
  relatedTerms: [tevekkul, kader, sabir]
  appearsIn: [2]

- id: kader
  term: kader
  arabic: قدر
  definitionEn: >-
    Divine determining — that all things unfold within God's knowledge and
    measure (with kazâ, its enactment in events). The Second Flash leans on the
    fuller treatment in the Twenty-Sixth Word to argue that one has no standing
    to complain of an illness the All-Wise has ordained.
  relatedTerms: [riza, tevekkul]
  appearsIn: [2, 16, 22]

- id: gaflet
  term: gaflet
  arabic: غفلة
  definitionEn: >-
    Heedlessness — the forgetful inattention to God and the hereafter that lets
    the passing world seem solid and lasting. Nursî calls his era an "age of
    neglect," in which an illness that turns a young person back toward the
    eternal can be a hidden mercy.
  relatedTerms: [nefis, tul-i-emel]
  appearsIn: [2, 3, 10, 16, 17]

- id: esbab
  term: esbâb (secondary causes)
  arabic: أسباب
  definitionEn: >-
    The chain of apparent, "natural" causes through which God acts. A recurring
    theme in Nursî: causes are only a veil and have no creative power of their
    own, so the First Flash urges turning past them to the Causer of Causes
    (Müsebbibü'l-Esbâb) — God Himself.
  relatedTerms: [tevhid, tevekkul]
  appearsIn: [1, 23]

- id: beka
  term: bekâ
  arabic: بقاء
  definitionEn: >-
    Permanence, undying continuance — the opposite of fenâ (passing away). God
    alone is el-Bâkî, the Truly Enduring; the Third Flash teaches that whatever
    is loved and spent for His sake takes on a reflection of that permanence.
  relatedTerms: [divine-names, marifetullah]
  appearsIn: [3]

- id: al-i-beyt
  term: Âl-i Beyt (the Prophet's Family)
  arabic: آل البيت
  definitionEn: >-
    The Prophet Muhammad's household and lineage — above all Ali, Fatima, Hasan,
    Husayn and their descendants. The Fourth Flash dwells on the love the Qur'an
    asks for them and on their role as guardians of his Sunna.
  relatedTerms: [sunnet, sahs-i-manevi]
  appearsIn: [4]

- id: icaz
  term: i'câz (miraculous inimitability)
  arabic: إعجاز
  definitionEn: >-
    The Qur'an's miraculous inimitability — the quality by which it cannot be
    matched. Nursî counts ten "aspects" of it; the Seventh Flash treats one of
    them, its tidings of the Unseen.
  relatedTerms: [ihbar-i-gaybi]
  appearsIn: [7, 12]

- id: ihbar-i-gaybi
  term: ihbâr-ı gaybî (tidings of the Unseen)
  arabic: إخبار غيبي
  definitionEn: >-
    The Qur'an's foretelling of things hidden at the time of revelation — past,
    future or unseen. The Seventh Flash draws seven such fulfilled predictions
    from the closing verses of Sūrat al-Fath.
  relatedTerms: [icaz, sahabe]
  appearsIn: [7]

- id: sahabe
  term: Sahâbe (the Companions)
  arabic: صحابة
  definitionEn: >-
    The Companions of the Prophet — those who knew and followed him in his
    lifetime. Nursî regards them as the most elevated of humankind after the
    prophets; they are central to the Seventh Flash's account of Qur'anic
    prophecy.
  relatedTerms: [al-i-beyt]
  appearsIn: [7]

- id: vahdet-i-vucud
  term: vahdetü'l-vücud (Unity of Existence)
  arabic: وحدة الوجود
  definitionEn: >-
    The "Unity of Existence" — the Sufi doctrine that in the end "there is no
    existent but God," so that the existence of created things is in some sense
    imaginary. The Ninth Flash respectfully argues this overstates a real
    insight: things are "all from Him," not "all Him."
  relatedTerms: [vahdet-i-suhud, tecelli, tevhid]
  appearsIn: [9]

- id: vahdet-i-suhud
  term: vahdetü'ş-şuhud (Unity of Witnessing)
  arabic: وحدة الشهود
  definitionEn: >-
    The "Unity of Witnessing" — the sober counterpart to the Unity of Existence:
    the seeker so witnesses God that nothing else registers, yet without denying
    that creatures truly, if dependently, exist. Nursî calls it the safer, higher
    way of the "people of sobriety."
  relatedTerms: [vahdet-i-vucud, tevhid]
  appearsIn: [9]

- id: tecelli
  term: tecellî
  arabic: تجلّي
  definitionEn: >-
    Manifestation or self-disclosure — the way God's names and attributes show
    themselves in creation, as the sun shows itself in countless mirrors. Each
    being is a tecellî: a real reflection, never identical with its Source.
  relatedTerms: [divine-names, ehadiyet]
  appearsIn: [9, 14]

- id: keramet
  term: kerâmet
  arabic: كرامة
  definitionEn: >-
    A saintly wonder — an extraordinary, God-given event granted to a friend of
    God, as distinct from a prophet's miracle (mu'cize). The Tenth Flash reads
    the steady pattern of its "compassionate slaps" as a kerâmet attending the
    service of the Qur'an.
  relatedTerms: []
  appearsIn: [10]

- id: rizik
  term: rızık
  arabic: رزق
  definitionEn: >-
    Provision — the sustenance God apportions to every creature. The Twelfth
    Flash argues it is guaranteed and runs inverse to a creature's own power, so
    that the most helpless (the unborn, the infant) are fed most freely.
  relatedTerms: [tevekkul, divine-names]
  appearsIn: [12]

- id: rahmet
  term: rahmet (divine mercy)
  arabic: رحمة
  definitionEn: >-
    Divine mercy — God's all-embracing compassion, which the Fourteenth Flash
    presents as the force that turns the whole universe toward needy man. The
    Bismillah is the way to take hold of it.
  relatedTerms: [besmele, divine-names]
  appearsIn: [14, 16]

- id: ehadiyet
  term: ehadiyet (divine oneness)
  arabic: أحدية
  definitionEn: >-
    Divine oneness — God known as wholly present in each single thing, as opposed
    to vâhidiyet, His unity across the whole. Nursî stresses "oneness within
    unity" so the mind, faced with vast multiplicity, can still meet the One
    directly.
  relatedTerms: [tevhid, divine-names, tecelli]
  appearsIn: [14, 23]

- id: mana-yi-harfi
  term: mânâ-yı harfî (other-indicating meaning)
  arabic: معنى حرفي
  definitionEn: >-
    Reading a thing "as a letter" — for the meaning it points to beyond itself,
    namely its Maker — as opposed to mânâ-yı ismî, reading it for itself. The
    Sixteenth Flash's mirror image: look at the glass and you miss the
    reflection. Materialist science, reading creation only "for itself," loses
    its way.
  relatedTerms: [tevhid, marifetullah]
  appearsIn: [16]

- id: nubuvvet
  term: nübüvvet (prophethood)
  arabic: نبوّة
  definitionEn: >-
    Prophethood — God's guidance of humanity through chosen messengers, which
    Nursî calls the foundation of human good and the index of true happiness
    (Seventeenth Flash, Ninth Note).
  relatedTerms: [sunnet, iman]
  appearsIn: [17]

- id: hasir
  term: haşir (bodily resurrection)
  arabic: حشر
  definitionEn: >-
    The gathering and bodily resurrection of all people for the Last Judgement.
    Nursî argues for it from nature's habit of renewal — the way each spring
    returns life in similar form (Seventeenth Flash, Fourth Note).
  relatedTerms: [iman]
  appearsIn: [17]

- id: tabiat
  term: tabiat (nature)
  arabic: طبيعة
  definitionEn: >-
    "Nature" — which materialism treats as a self-sufficient creative force. The
    Twenty-Third Flash argues it is at most God's artwork, decree and law — "a
    body of the laws of creation, not the Lawgiver" — a passive screen, never an
    agent.
  relatedTerms: [esbab, tevhid]
  appearsIn: [23]
